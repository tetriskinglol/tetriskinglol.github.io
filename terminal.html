<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Terminal</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    overflow: hidden;
}

/* MATRIX CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TERMINAL */
.terminal {
    padding: 20px;
}

.output {
    margin-bottom: 6px;
    text-shadow: 0 0 5px #00ff9f;
}

.input-line {
    display: flex;
}

.prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    outline: none;
    color: #00ff9f;
    width: 100%;
    font-family: monospace;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal" id="terminal">
    <div class="output">> Cyber Terminal Ready</div>

    <div class="input-line">
        <span class="prompt">></span>
        <input type="text" id="commandInput" autofocus>
    </div>
</div>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array.from({length: columns}).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    });
}

setInterval(drawMatrix, 50);

// FIX RESIZE
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// TERMINAL LOGIC
const input = document.getElementById("commandInput");
const terminal = document.getElementById("terminal");

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const command = input.value;
        addLine("> " + command);
        processCommand(command.toLowerCase());
        input.value = "";
    }
});

function addLine(text) {
    const line = document.createElement("div");
    line.className = "output";
    line.textContent = text;
    terminal.insertBefore(line, terminal.lastElementChild);
}

function fakeProcess(lines, delay = 400) {
    lines.forEach((line, i) => {
        setTimeout(() => addLine(line), i * delay);
    });
}

function processCommand(cmd) {
    if (cmd === "scan system") {
        fakeProcess([
            "Scanning system...",
            "Checking files...",
            "No threats detected.",
            "System secure."
        ]);
    } 
    else if (cmd === "analyse vulnerabilities") {
        fakeProcess([
            "Analysing security layers...",
            "Reviewing configurations...",
            "Minor weaknesses found.",
            "Recommendation: Enable 2FA."
        ]);
    } 
    else if (cmd === "run diagnostics") {
        fakeProcess([
            "Running diagnostics...",
            "CPU: OK",
            "Memory: OK",
            "Network: Stable",
            "Diagnostics complete."
        ]);
    } 
    else {
        addLine("Unknown command.");
    }
}
</script>

</body>
</html>
